name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  package-macos:
    name: Package macOS app
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Build release archive
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          ZIP_APP: "1"
        run: Scripts/package-macos-app.sh

      - name: Rename release archive
        run: mv dist/Quartz.zip "dist/Quartz-${{ needs.release-please.outputs.tag_name }}-macos-universal.zip"

      - name: Upload release archive
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "dist/Quartz-${{ needs.release-please.outputs.tag_name }}-macos-universal.zip" --clobber
